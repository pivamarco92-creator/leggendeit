<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Leggende d'Italia</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; background:#14141f; overflow:hidden;
    font-family:'Courier New', monospace; -webkit-user-select:none; user-select:none; }
  #shell { display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; gap:10px; }
  #frame { background:#243024; border-radius:12px; padding:14px 16px;
    box-shadow:0 12px 40px rgba(0,0,0,.6), inset 0 2px 0 rgba(255,255,255,.08); }
  #brand { color:#9ab88a; font-size:10px; letter-spacing:2px; text-align:center;
    margin-top:8px; font-weight:bold; }
  #screenWrap { position:relative; width:480px; height:320px; background:#101018;
    overflow:hidden; border:2px solid #0a0a10; }
  #gameContainer { position:absolute; inset:0; width:100%; height:100%; }
  #gameContainer canvas { display:block; width:100% !important; height:100% !important;
    image-rendering:pixelated; image-rendering:crisp-edges; }

  .overlay { position:absolute; inset:0; display:none; }
  #titleScr { background:#11251a; color:#bcd8a8; text-align:center; padding-top:46px;
    display:block; z-index:30; }
  #titleScr h1 { font-size:32px; letter-spacing:3px; color:#eef8d8; text-shadow:3px 3px 0 #2c4a30; }
  #titleScr h2 { font-size:14px; margin-top:6px; color:#8fb878; letter-spacing:2px; }
  #titleScr .tri { margin-top:22px; font-size:11px; line-height:1.9; color:#a8c896; }
  #titleScr .blink { margin-top:24px; font-size:13px; animation:blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity:0; } }

  #dlg { position:absolute; left:6px; right:6px; bottom:6px; min-height:84px;
    background:#f8f8f8; border:4px solid #222; border-radius:6px; padding:10px 12px;
    font-size:14px; line-height:1.5; color:#111; display:none; z-index:20; white-space:pre-wrap; }
  #dlg .arrow { position:absolute; right:10px; bottom:4px; animation:blink .8s steps(2) infinite; }
  #dlgName { position:absolute; left:10px; bottom:96px; background:#f8f8f8; border:3px solid #222;
    border-radius:5px; padding:3px 10px; font-size:12px; font-weight:bold; display:none; z-index:21; }
  #choiceBox { position:absolute; right:8px; bottom:96px; background:#f8f8f8; border:4px solid #222;
    border-radius:6px; padding:8px 12px; font-size:13px; line-height:1.9; display:none; z-index:22;
    color:#111; max-width:330px; }
  #choiceBox .opt.sel::before { content:'▶ '; }
  #choiceBox .opt::before { content:'  '; white-space:pre; }
  #choiceBox .opt { cursor:pointer; }

  /* UI battaglia (sopra la BattleScene di Phaser) */
  #battleUI { z-index:10; pointer-events:none; }
  #battleUI > * { pointer-events:auto; }
  .binfo { position:absolute; background:#f8f8f0; border:3px solid #333; border-radius:6px;
    padding:6px 10px; font-size:12px; width:190px; color:#111; }
  #eInfo { top:12px; left:12px; }
  #pInfo { top:148px; right:12px; }
  .hpRow { display:flex; align-items:center; gap:5px; margin-top:4px; }
  .hpLabel { font-size:9px; font-weight:bold; color:#c8a000; }
  .hpOuter { flex:1; height:8px; background:#444; border-radius:4px; padding:1px; }
  .hpInner { height:6px; background:#30c020; border-radius:3px; width:100%;
    transition:width .45s, background .45s; }
  .hpNum { font-size:10px; text-align:right; margin-top:2px; }
  #bMsg { position:absolute; left:0; right:0; bottom:0; height:96px; background:#283050;
    border-top:4px solid #111; color:#fff; padding:12px 14px; font-size:14px; line-height:1.5;
    white-space:pre-wrap; }
  #bMenu { position:absolute; right:0; bottom:0; width:220px; height:96px; background:#f8f8f8;
    border:4px solid #111; display:none; grid-template-columns:1fr 1fr; padding:10px 6px 10px 14px;
    font-size:14px; font-weight:bold; color:#111; }
  #bMenu div { align-self:center; cursor:pointer; }
  #bMenu div.sel::before { content:'▶'; }
  #bList { position:absolute; left:0; right:0; bottom:0; height:96px; background:#f8f8f8;
    border-top:4px solid #111; display:none; padding:8px 16px; font-size:13px; line-height:1.7;
    color:#111; overflow-y:auto; }
  #bList .opt.sel::before { content:'▶ '; }
  #bList .opt::before { content:'  '; white-space:pre; }
  #bList .opt { cursor:pointer; }
  #bList .meta { float:right; color:#666; font-size:11px; }
  /* mosse in griglia 2×2 (display:grid impostato da showPanels) */
  #bList.movegrid { grid-template-columns:1fr 1fr; gap:0 14px; align-content:start; line-height:1.25; }
  #bList.movegrid .opt { white-space:normal; padding:2px; }
  #bList.movegrid .opt .meta { display:block; float:none; font-size:10px; color:#555; }
  #bList.movegrid .opt.sel { background:#e3ecff; border-radius:4px; }

  /* Menù di pausa (esplorazione) */
  #menuScr { z-index:25; }
  #menuBox { position:absolute; top:6px; right:6px; width:148px; background:#f8f8f8;
    border:4px solid #222; border-radius:6px; padding:6px 0; font-size:13px; color:#111; }
  #menuBox .title { font-weight:bold; padding:2px 10px 6px; border-bottom:2px solid #ccc; margin-bottom:4px; }
  #menuBox .opt { padding:3px 10px 3px 18px; position:relative; cursor:pointer; }
  #menuBox .opt.sel::before { content:'▶'; position:absolute; left:5px; }
  #menuPanel { position:absolute; top:6px; left:6px; right:162px; bottom:6px; background:#f8f8f8;
    border:4px solid #222; border-radius:6px; padding:10px 12px; font-size:12px; color:#111;
    overflow-y:auto; display:none; line-height:1.55; }
  #menuPanel h3 { font-size:13px; margin-bottom:6px; color:#222; }
  #menuPanel .hintbar { color:#888; font-size:10px; margin-top:8px; }
  #menuPanel .row { padding:2px 6px; position:relative; border-radius:4px; overflow-wrap:anywhere; }
  #menuPanel .row.sel { background:#d8e6ff; }
  #menuPanel .row.move { background:#ffe2a8; }
  #menuPanel .meta { float:right; color:#666; margin-left:8px; max-width:62%; text-align:right; }
  /* schermata MAPPA a riquadri */
  #menuPanel .regttl { font-weight:bold; margin:6px 0 1px; }
  #menuPanel .regttl.regnow { color:#1a8a55; }
  #menuPanel .maprow { display:flex; flex-wrap:wrap; gap:3px; align-items:center; margin:1px 0 1px 8px; }
  #menuPanel .chip { border:2px solid #999; border-radius:4px; padding:0 4px; font-size:10px; background:#efefef; color:#222; }
  #menuPanel .chip.here { background:#ffd86b; border-color:#c89010; font-weight:bold; }
  #menuPanel .chip.secret { border-color:#7a3aa0; }
  #menuPanel .sep { color:#aaa; font-size:10px; }
  #menuPanel .maplink { color:#888; font-size:10px; margin:0 0 3px 8px; }
  #menuPanel .pivadet { font-size:10px; color:#444; background:#e8ecff; border-radius:4px; padding:3px 6px; margin:0 0 3px 8px; }

  /* Laptop del deposito (PC box) */
  #boxScr { z-index:26; }
  #boxPanel { position:absolute; inset:6px; background:#f8f8f8; border:4px solid #222; border-radius:6px;
    padding:8px 12px; font-size:12px; color:#111; overflow-y:auto; line-height:1.5; }
  #boxPanel h3 { font-size:13px; margin-bottom:4px; color:#222; }
  #boxPanel .row { padding:2px 6px; border-radius:4px; position:relative; }
  #boxPanel .row.sel { background:#d8e6ff; }
  #boxPanel .meta { float:right; color:#666; }
  #boxPanel .status { color:#b06000; font-size:11px; min-height:14px; margin-top:4px; }
  #boxPanel .hintbar { color:#888; font-size:10px; margin-top:6px; }

  /* la scelta (ask) può scorrere se ha molte voci */
  #choiceBox { max-height:240px; overflow-y:auto; }

  #endScr { background:#11251a; color:#bcd8a8; text-align:center; padding-top:40px; z-index:40;
    font-size:13px; line-height:2; }
  #endScr h1 { color:#eef8d8; font-size:22px; margin-bottom:10px; }

  #pads {
  display:flex;
  justify-content:space-between;
  width:480px;
  margin-top:6px;
}

.padBtn {
  background:#2a2a3e;
  color:#ddd;
  border:none;
  border-radius:8px;
  width:46px;
  height:46px;
  font-size:16px;
  cursor:pointer;
  touch-action:manipulation;
}

.padBtn:active { background:#444; }

#dpad {
  display:grid;
  grid-template-columns:repeat(3,48px);
  grid-template-rows:repeat(3,48px);
  gap:2px;
}

#ab {
  display:flex;
  gap:14px;
  align-items:center;
}

#ab .padBtn {
  width:56px;
  height:56px;
  border-radius:50%;
  background:#2c5a34;
  color:#fff;
  font-weight:bold;
}

#hint {
  color:#8888aa;
  font-size:11px;
  text-align:center;
  margin-top:4px;
}

@media (max-width:500px) {
  html,
  body {
    height:100%;
    min-height:100dvh;
  }

  #shell {
    justify-content:center;
    min-height:100dvh;
    padding:calc(8px + env(safe-area-inset-top)) 0 calc(10px + env(safe-area-inset-bottom));
    gap:6px;
  }

  #frame {
    width:100vw;
    padding:6px 6px;
    border-radius:0;
  }

  #screenWrap {
    width:min(96vw, calc((100dvh - 184px) * 1.5), 480px);
    min-width:300px;
    height:auto;
    aspect-ratio: 3 / 2;
    margin:0 auto;
  }

  #brand {
    margin-top:6px;
    font-size:9px;
    letter-spacing:1px;
  }

  .binfo {
    width:40%;
    min-width:136px;
    padding:5px 7px;
    font-size:11px;
  }

  #eInfo {
    top:8px;
    left:8px;
  }

  #pInfo {
    top:43%;
    right:8px;
  }

  #bMsg {
    height:30%;
    min-height:78px;
    padding:9px 10px;
    font-size:12px;
    line-height:1.45;
  }

  #bMenu {
    width:48%;
    height:30%;
    min-height:78px;
    padding:8px 5px 8px 10px;
    font-size:12px;
  }

  #bList {
    height:30%;
    min-height:78px;
    padding:7px 10px;
    font-size:12px;
    line-height:1.55;
  }

  #bList .meta {
    float:none;
    display:block;
    font-size:10px;
    padding-left:16px;
  }

  #menuScr {
    padding:5px;
  }

  #menuBox {
    top:5px;
    right:5px;
    width:118px;
    font-size:12px;
  }

  #menuPanel {
    top:5px;
    left:5px;
    right:128px;
    bottom:5px;
    padding:8px;
    font-size:11px;
    line-height:1.45;
  }

  #menuPanel .row {
    padding:3px 5px;
  }

  #menuPanel .meta {
    float:none;
    display:block;
    max-width:none;
    margin-left:0;
    text-align:left;
    font-size:10px;
  }

  #menuPanel .hintbar {
    font-size:9px;
  }

  #choiceBox {
    left:8px;
    right:8px;
    bottom:92px;
    max-width:none;
    max-height:46%;
    font-size:12px;
  }

  #pads {
    width:min(95vw, 360px);
    max-width:360px;
    margin-top:2px;
  }

  #dpad {
    grid-template-columns:repeat(3,40px);
    grid-template-rows:repeat(3,40px);
  }

  .padBtn {
    width:38px;
    height:38px;
    font-size:14px;
  }

  #ab .padBtn {
    width:48px;
    height:48px;
  }

  #hint {
    font-size:10px;
    padding:0 10px;
  }
}
</style>
</head>
<body>
<div id="shell">
  <div id="frame">
    <div id="screenWrap">
      <div id="gameContainer"></div>
      <div id="titleScr" class="overlay">
        <h1>LEGGENDE</h1>
        <h2>★ D'ITALIA ★</h2>
        <div class="tri">Folklore, palestre e mala —<br><span id="titleRegions">Regioni di 20</span><br>dal Duomo di Milano al Sud<br><br>«Taaac.»</div>
        <div class="blink">— PREMI INVIO o A —</div>
      </div>
      <div id="battleUI" class="overlay">
        <div class="binfo" id="eInfo">
          <span id="eName">?</span> <span id="eLv" style="float:right">L?</span>
          <div class="hpRow"><span class="hpLabel">PS</span><div class="hpOuter"><div class="hpInner" id="eHp"></div></div></div>
        </div>
        <div class="binfo" id="pInfo">
          <span id="pName">?</span> <span id="pLv" style="float:right">L?</span>
          <div class="hpRow"><span class="hpLabel">PS</span><div class="hpOuter"><div class="hpInner" id="pHp"></div></div></div>
          <div class="hpNum" id="pHpNum"></div>
          <div class="hpRow" style="margin-top:2px"><span class="hpLabel" style="color:#5a8fc8">EXP</span><div class="hpOuter" style="height:5px"><div class="hpInner" id="pExp" style="height:3px;background:#5aa0e0;transition:width .35s"></div></div></div>
        </div>
        <div id="bMsg"></div>
        <div id="bMenu">
          <div data-i="0">LOTTA</div><div data-i="1">BORSA</div>
          <div data-i="2">SQUADRA</div><div data-i="3">FUGA</div>
        </div>
        <div id="bList"></div>
      </div>
      <div id="menuScr" class="overlay">
        <div id="menuPanel"></div>
        <div id="menuBox"></div>
      </div>
      <div id="boxScr" class="overlay"><div id="boxPanel"></div></div>
      <div id="endScr" class="overlay"></div>
      <div id="dlgName"></div>
      <div id="choiceBox"></div>
      <div id="dlg"><span id="dlgText"></span><span class="arrow">▼</span></div>
    </div>
    <div id="brand">LEGGENDE D'ITALIA · PHASER 3</div>
  </div>
  <div id="pads">
    <div id="dpad">
      <span></span><button class="padBtn" data-k="ArrowUp">▲</button><span></span>
      <button class="padBtn" data-k="ArrowLeft">◀</button><span></span><button class="padBtn" data-k="ArrowRight">▶</button>
      <span></span><button class="padBtn" data-k="ArrowDown">▼</button><span></span>
    </div>
    <div id="ab">
      <button class="padBtn" data-k="x">B</button>
      <button class="padBtn" data-k="z">A</button>
    </div>
  </div>
  <div id="hint">Frecce/WASD: muoviti · Z/INVIO: A · X/ESC: B / Menù &nbsp;|&nbsp; Serve internet (Phaser via CDN)</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<!-- Dati di gioco (modificabili senza toccare il codice) -->
<script src="data/assets.js"></script>
<script src="data/types.js"></script>
<script src="data/moves.js"></script>
<script src="data/creatures.js"></script>
<script src="data/items.js"></script>
<script src="data/maps.js"></script>
<script src="data/npcs.js"></script>
<script src="data/regions.js"></script>
<!-- Engine -->
<script src="src/state.js"></script>
<script src="src/dialog.js"></script>
<script src="src/world.js"></script>
<script src="src/battlescene.js"></script>
<script src="src/battle.js"></script>
<script src="src/story.js"></script>
<script src="src/menu.js"></script>
<script src="src/box.js"></script>
<script src="src/main.js"></script>
<script>
  /* Aggiorna il conteggio regioni nella schermata iniziale (da GYMS, così non resta mai vecchio). */
  (function () {
    try {
      var n = (typeof GYMS !== 'undefined') ? Object.keys(GYMS).length : 0;
      var el = document.getElementById('titleRegions');
      if (el && n) el.textContent = n + ' regioni di 20 giocabili';
    } catch (e) {}
  })();
</script>
</body>
</html>
